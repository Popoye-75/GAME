<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test.com|CSS</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/numberhunt.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="main-header">
      <div class="main-header-logo">
        <a href="/index.html"></a>
      </div>
      <nav class="main-header-navbar">
        <ul>
          <li><a href="/index.html">Home</a></li>
          <li class="main-header-navbar-dropdown">
            <a href="#">Products</a>
            <div class="main-header-navbar-dropdown-content">
              <a href="/numberhunt.html">Number Hunt</a>
              <a href="#">Tic Tac Toe</a>
              <a href="#">Spin Wheel</a>
              <a href="#">Millionaire</a>
            </div>
          </li>
          <li><a href="#">Services</a></li>
          <li class="main-header-navbar-dropdown"><a href="#">Contact</a></li>
          <li><a href="/about.html">About us</a></li>
        </ul>
      </nav>
      <button onclick="showLogin()" class="main-header-login">Login</button>
    </div>

    <!-- -------------LogIn page------------------ -->

    <div id="loginInterface" class="login">
      <div class="login-info">
        <h2>Login</h2>
        <form action="#">
          <label for="loginEmail">Email</label><br />
          <input id="loginEmail" type="email" placeholder="Email" /><br />
          <label for="loginPassword">Password</label><br />
          <input
            id="loginPassword"
            type="password"
            placeholder="Password"
          /><br />
          <label for="rememberMe">
            <input id="rememberMe" type="checkbox" /> Remember me </label
          ><br />
          <button type="submit" class="login-info-btn btn">Log In</button>
        </form>
        <p>
          Don't have an account? <a onclick="showSignUp()" href="#">Sign Up</a>
        </p>
      </div>
    </div>

    <!-- -------------SignUp page------------------ -->

    <div id="signInterface" class="signUp login">
      <div class="login-info">
        <h2>Sign Up</h2>
        <form action="#">
          <label for="signName">Name</label><br />
          <input id="signName" type="text" placeholder="Name" /><br />
          <label for="signEmail">Email</label><br />
          <input id="signEmail" type="email" placeholder="Email" /><br />
          <label for="signPassword">Password</label><br />
          <input
            id="signPassword"
            type="password"
            placeholder="Password"
          /><br />
          <button type="submit" class="singUp login-info-btn btn">
            Submit
          </button>
        </form>
        <p>
          Aready have an account? <a onclick="showLogin()" href="#">Sign In</a>
        </p>
      </div>
    </div>

    <!-- --------------Game------------------ -->
    <main class="game">
      <h1>Number Hunt</h1>
      <div class="game-console">
        <div class="game-console-box centerBox">
          <div class="game-console-box-info">
            <h2>Hidden Number</h2>
            <p>55</p>
          </div>
          <div class="game-console-box-info">
            <div class="game-console-box-info-timer">
              <h2>Remaining Time</h2>
              <p>00:30</p>
            </div>
            <h2>Message</h2>
            <p>Try higher number</p>
          </div>
          <div class="game-console-box-info">
            <h2>Mode</h2>
            <div class="game-console-box-mode">
              <img
                src="/assets/images/countdown.png"
                alt="Picture of countdown"
              /><img
                src="/assets/images/stopwatch.png"
                alt="Picture of stopwatch"
              />
            </div>
            <div class="game-console-box-info-btn">
              <button>Start</button>
              <button>Restart</button>
              </div>
          </div>
        </div>
        <div class="game-console-input"></div>
      </div>
      <aside class="game-score"></aside>
    </main>
  </body>
  <script src="index.js"></script>
</html>
